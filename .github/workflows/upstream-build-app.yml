name: Upstream DMG Watcher

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  UPSTREAM_DMG_URL: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg
  UPSTREAM_DMG_PATH: /tmp/codex-upstream-ci/Codex.dmg
  DMG_CACHE_SCHEMA_VERSION: v1

jobs:
  build-app-upstream-dmg:
    name: Watch Upstream DMG
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full make g++ python3 curl unzip

      - name: Capture upstream DMG metadata
        id: upstream-metadata
        run: |
          set -euo pipefail

          headers_file="$(mktemp)"
          trap 'rm -f "$headers_file"' EXIT

          curl -fsSLI "$UPSTREAM_DMG_URL" > "$headers_file"

          last_modified="$(awk 'BEGIN{IGNORECASE=1} /^last-modified:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); print; exit}' "$headers_file")"
          etag="$(awk 'BEGIN{IGNORECASE=1} /^etag:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); gsub(/"/,""); print; exit}' "$headers_file")"
          content_length="$(awk 'BEGIN{IGNORECASE=1} /^content-length:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); print; exit}' "$headers_file")"

          if [ -z "$last_modified" ]; then
            last_modified="unknown"
          fi
          if [ -z "$etag" ]; then
            etag="no-etag"
          fi
          if [ -z "$content_length" ]; then
            content_length="unknown"
          fi

          cache_segment="$(printf '%s|%s|%s\n' "$last_modified" "$etag" "$content_length" | sha256sum | cut -d' ' -f1)"

          {
            echo "last_modified=$last_modified"
            echo "etag=$etag"
            echo "content_length=$content_length"
            echo "cache_segment=$cache_segment"
          } >> "$GITHUB_OUTPUT"

      - name: Restore cached upstream DMG
        id: dmg-cache
        uses: actions/cache@v4
        with:
          path: /tmp/codex-upstream-ci/Codex.dmg
          key: upstream-dmg-${{ env.DMG_CACHE_SCHEMA_VERSION }}-${{ steps.upstream-metadata.outputs.cache_segment }}

      - name: Download upstream DMG
        if: steps.dmg-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$UPSTREAM_DMG_PATH")"
          curl -fL --retry 3 -o "$UPSTREAM_DMG_PATH" "$UPSTREAM_DMG_URL"

      - name: Record local DMG fingerprint
        id: local-dmg
        run: |
          set -euo pipefail

          test -s "$UPSTREAM_DMG_PATH"

          dmg_sha256="$(sha256sum "$UPSTREAM_DMG_PATH" | cut -d' ' -f1)"
          dmg_size_bytes="$(stat -c '%s' "$UPSTREAM_DMG_PATH")"
          tested_at_utc="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "sha256=$dmg_sha256"
            echo "size_bytes=$dmg_size_bytes"
            echo "tested_at_utc=$tested_at_utc"
          } >> "$GITHUB_OUTPUT"

          cat > upstream-dmg-metadata.json <<JSON
          {
            "url": "$UPSTREAM_DMG_URL",
            "last_modified": "${{ steps.upstream-metadata.outputs.last_modified }}",
            "etag": "${{ steps.upstream-metadata.outputs.etag }}",
            "content_length": "${{ steps.upstream-metadata.outputs.content_length }}",
            "sha256": "$dmg_sha256",
            "size_bytes": "$dmg_size_bytes",
            "tested_at_utc": "$tested_at_utc",
            "cache_schema_version": "${{ env.DMG_CACHE_SCHEMA_VERSION }}"
          }
          JSON

      - name: Build app from upstream DMG
        run: CODEX_PATCH_REPORT_JSON="$GITHUB_WORKSPACE/patch-report.json" make build-app DMG=/tmp/codex-upstream-ci/Codex.dmg

      - name: Record upstream app version
        id: app-version
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const metadataPath = "upstream-dmg-metadata.json";
          const buildInfoPath = "codex-app/resources/codex-linux-build-info.json";
          const metadata = JSON.parse(fs.readFileSync(metadataPath, "utf8"));
          const buildInfo = JSON.parse(fs.readFileSync(buildInfoPath, "utf8"));
          const version = buildInfo?.upstreamDmg?.appVersion;
          if (typeof version !== "string" || !/^[0-9]+[.][0-9]+[.][0-9]+$/.test(version)) {
            throw new Error(`Unable to read upstream app version from ${buildInfoPath}`);
          }
          metadata.upstream_app_version = version;
          fs.writeFileSync(metadataPath, `${JSON.stringify(metadata, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `upstream_app_version=${version}\n`);
          NODE

      - name: Compare with approved upstream lock
        id: upstream-lock
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const lock = JSON.parse(fs.readFileSync("release/upstream-dmg-lock.json", "utf8"));
          const approved = lock.approved;
          const liveSha = process.env.LIVE_DMG_SHA;
          const liveVersion = process.env.LIVE_APP_VERSION;
          const isDrift = approved?.sha256 !== liveSha || approved?.upstream_app_version !== liveVersion;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_drift=${isDrift ? "true" : "false"}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `approved_sha256=${approved?.sha256 ?? ""}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `approved_app_version=${approved?.upstream_app_version ?? ""}\n`);
          NODE
        env:
          LIVE_DMG_SHA: ${{ steps.local-dmg.outputs.sha256 }}
          LIVE_APP_VERSION: ${{ steps.app-version.outputs.upstream_app_version }}

      - name: Validate required upstream patches
        id: patch-validation
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/ci/validate-patch-report.js patch-report.json --profile upstream-build 2>&1 | tee patch-validation.log

      - name: Stage candidate metadata artifacts
        if: steps.patch-validation.outcome == 'success' && steps.upstream-lock.outputs.is_drift == 'true'
        id: candidate
        run: |
          set -euo pipefail
          rm -rf upstream-candidate-artifacts
          mkdir -p upstream-candidate-artifacts
          node scripts/ci/write-upstream-candidate-report.js \
            --metadata upstream-dmg-metadata.json \
            --patch-report patch-report.json \
            --metadata-out upstream-candidate-artifacts/upstream-dmg-metadata.json \
            --patch-report-out upstream-candidate-artifacts/patch-report.json \
            --candidate upstream-candidate-artifacts/upstream-dmg-candidate.json \
            --issue-body upstream-candidate-artifacts/upstream-dmg-candidate-issue.md \
            --summary upstream-candidate-artifacts/upstream-dmg-candidate-summary.md \
            --private-path "$GITHUB_WORKSPACE" \
            --private-path "$RUNNER_TEMP" \
            --private-path "$UPSTREAM_DMG_PATH" \
            --github-output "$GITHUB_OUTPUT"
          node scripts/ci/validate-no-payload-artifacts.js \
            --private-path "$GITHUB_WORKSPACE" \
            --private-path "$RUNNER_TEMP" \
            --private-path "$UPSTREAM_DMG_PATH" \
            upstream-candidate-artifacts

      - name: Upload upstream DMG candidate metadata artifact
        if: steps.patch-validation.outcome == 'success' && steps.upstream-lock.outputs.is_drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-dmg-candidate-metadata
          path: upstream-candidate-artifacts/
          if-no-files-found: error

      - name: Write supported-version summary
        if: steps.patch-validation.outcome == 'success'
        run: node scripts/ci/render-supported-md.js --check --summary-out "$GITHUB_STEP_SUMMARY"

      - name: Open or update candidate promotion issue
        if: steps.patch-validation.outcome == 'success' && steps.upstream-lock.outputs.is_drift == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.candidate.outputs.issue_title }}
          ISSUE_BODY: upstream-candidate-artifacts/upstream-dmg-candidate-issue.md
        run: |
          set -euo pipefail

          issues_json="$(mktemp)"
          trap 'rm -f "$issues_json"' EXIT
          gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "$ISSUE_TITLE in:title" \
            --json title,url > "$issues_json"

          issue_url="$(node -e '
          const fs = require("node:fs");
          const issues = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
          const title = process.env.ISSUE_TITLE;
          const match = issues.find((issue) => issue.title === title);
          if (match) process.stdout.write(match.url);
          ' "$issues_json")"

          if [ -n "$issue_url" ]; then
            gh issue edit "$issue_url" --body-file "$ISSUE_BODY"
            echo "- Candidate promotion issue updated: $issue_url" >> "$GITHUB_STEP_SUMMARY"
          else
            issue_url="$(gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$ISSUE_TITLE" \
              --body-file "$ISSUE_BODY")"
            echo "- Candidate promotion issue created: $issue_url" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write build summary
        if: steps.patch-validation.outcome == 'success'
        env:
          IS_DRIFT: ${{ steps.upstream-lock.outputs.is_drift }}
          APPROVED_VERSION: ${{ steps.upstream-lock.outputs.approved_app_version }}
          APPROVED_SHA: ${{ steps.upstream-lock.outputs.approved_sha256 }}
          CANDIDATE_TITLE: ${{ steps.candidate.outputs.issue_title }}
        run: |
          {
            echo "## Upstream DMG Watcher"
            echo ""
            echo "- DMG URL: \`$UPSTREAM_DMG_URL\`"
            echo "- Upstream App Version: \`${{ steps.app-version.outputs.upstream_app_version }}\`"
            echo "- DMG Last-Modified: \`${{ steps.upstream-metadata.outputs.last_modified }}\`"
            echo "- DMG ETag: \`${{ steps.upstream-metadata.outputs.etag }}\`"
            echo "- DMG Content-Length: \`${{ steps.upstream-metadata.outputs.content_length }}\`"
            echo "- DMG SHA-256: \`${{ steps.local-dmg.outputs.sha256 }}\`"
            echo "- DMG Size (bytes): \`${{ steps.local-dmg.outputs.size_bytes }}\`"
            echo "- Tested At (UTC): \`${{ steps.local-dmg.outputs.tested_at_utc }}\`"
            echo "- Cache Hit: \`${{ steps.dmg-cache.outputs.cache-hit || 'false' }}\`"
            echo "- Approved App Version: \`$APPROVED_VERSION\`"
            echo "- Approved DMG SHA-256: \`$APPROVED_SHA\`"
            echo "- Live DMG Drift: \`$IS_DRIFT\`"
            echo "- Build command: \`make build-app DMG=<local upstream DMG>\`"
            echo "- Patch report: \`patch-report.json\`"
            if [ "$IS_DRIFT" = "true" ]; then
              echo "- Candidate artifact: \`upstream-dmg-candidate-metadata\`"
              echo "- Candidate promotion record: \`$CANDIDATE_TITLE\`"
            else
              echo "- Candidate artifact: not created because the live DMG matches the approved pin."
            fi
            echo "- Artifact boundary: metadata and reports only; no DMG, extracted app, or package payload."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage upstream patch drift report
        if: steps.patch-validation.outcome == 'failure'
        id: drift
        run: |
          set -euo pipefail
          rm -rf upstream-drift-artifacts
          mkdir -p upstream-drift-artifacts
          node scripts/ci/write-upstream-drift-report.js \
            --metadata upstream-dmg-metadata.json \
            --patch-report patch-report.json \
            --validation-log patch-validation.log \
            --metadata-out upstream-drift-artifacts/upstream-dmg-metadata.json \
            --patch-report-out upstream-drift-artifacts/patch-report.json \
            --validation-log-out upstream-drift-artifacts/patch-validation.log \
            --issue-body upstream-drift-artifacts/upstream-dmg-drift-issue.md \
            --private-path "$GITHUB_WORKSPACE" \
            --private-path "$RUNNER_TEMP" \
            --private-path "$UPSTREAM_DMG_PATH" \
            --github-output "$GITHUB_OUTPUT"

          node scripts/ci/validate-no-payload-artifacts.js \
            --private-path "$GITHUB_WORKSPACE" \
            --private-path "$RUNNER_TEMP" \
            --private-path "$UPSTREAM_DMG_PATH" \
            upstream-drift-artifacts

      - name: Upload upstream patch drift metadata artifact
        if: steps.patch-validation.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-dmg-patch-drift-metadata
          path: upstream-drift-artifacts/
          if-no-files-found: error

      - name: Open or update upstream patch drift issue
        if: steps.patch-validation.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.drift.outputs.issue_title }}
          ISSUE_BODY: upstream-drift-artifacts/upstream-dmg-drift-issue.md
        run: |
          set -euo pipefail

          issues_json="$(mktemp)"
          trap 'rm -f "$issues_json"' EXIT
          gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "$ISSUE_TITLE in:title" \
            --json title,url > "$issues_json"

          issue_url="$(node -e '
          const fs = require("node:fs");
          const issues = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
          const title = process.env.ISSUE_TITLE;
          const match = issues.find((issue) => issue.title === title);
          if (match) process.stdout.write(match.url);
          ' "$issues_json")"

          if [ -n "$issue_url" ]; then
            gh issue edit "$issue_url" --body-file "$ISSUE_BODY"
            echo "- Upstream patch drift issue updated: $issue_url" >> "$GITHUB_STEP_SUMMARY"
          else
            issue_url="$(gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$ISSUE_TITLE" \
              --body-file "$ISSUE_BODY")"
            echo "- Upstream patch drift issue created: $issue_url" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write patch drift summary
        if: steps.patch-validation.outcome == 'failure'
        run: |
          {
            echo "## Upstream DMG Watcher"
            echo ""
            echo "- DMG URL: \`$UPSTREAM_DMG_URL\`"
            echo "- Upstream App Version: \`${{ steps.app-version.outputs.upstream_app_version }}\`"
            echo "- DMG Last-Modified: \`${{ steps.upstream-metadata.outputs.last_modified }}\`"
            echo "- DMG ETag: \`${{ steps.upstream-metadata.outputs.etag }}\`"
            echo "- DMG Content-Length: \`${{ steps.upstream-metadata.outputs.content_length }}\`"
            echo "- DMG SHA-256: \`${{ steps.local-dmg.outputs.sha256 }}\`"
            echo "- Patch validation: failed; candidate promotion was blocked."
            echo "- Drift artifact: \`upstream-dmg-patch-drift-metadata\`"
            echo "- Artifact boundary: metadata and reports only; no DMG, extracted app, or package payload."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when upstream patch validation failed
        if: steps.patch-validation.outcome == 'failure'
        run: exit 1
